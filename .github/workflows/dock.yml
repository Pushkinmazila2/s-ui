name: Build & Push s-ui manual

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # ручной запуск из GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/s-ui

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # нужно для пуша в GHCR

    steps:
      - name: Checkout backend (s-ui)
        uses: actions/checkout@v4
        with:
          repository: Pushkinmazila2/s-ui
          path: s-ui

      - name: Checkout frontend (s-ui-frontend)
        uses: actions/checkout@v4
        with:
          repository: Pushkinmazila2/s-ui-frontend
          path: s-ui-frontend

      # Dockerfile ожидает фронт в папке frontend/ внутри бэкенда
      - name: Place frontend into backend/frontend/
        run: cp -r s-ui-frontend/. s-ui/frontend/

      - name: Build frontend (debug step)
        run: |
          cd s-ui/frontend
          npm install
          npm run build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: s-ui
          push: true
          # собираем только под amd64 — убери если нужен arm тоже
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
